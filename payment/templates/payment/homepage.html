{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecurePayAi | Home</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lottie-web@5.7.4/build/player/lottie.min.js"></script>
</head>
<body>

<div class="hero-container">
    <div class="hero-overlay d-flex flex-column justify-content-center align-items-center text-center">

        <!-- Branding Title Only -->
        <h1 class="display-4 fw-bold text-white mb-4">SecurePayAi</h1>

        <!-- Lottie Animation -->
        <div id="lottie-container" class="mb-3"></div>
        <script>
            var animation = lottie.loadAnimation({
                container: document.getElementById('lottie-container'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: "{% static 'animations/payment.json' %}"
            });
        </script>

        <!-- GIF Animation -->
        <div class="payment-gif mb-3">
            <img src="{% static 'images/payment_app.gif' %}" alt="Payment App GIF" class="img-fluid">
        </div>

        <!-- Main Buttons -->
        <div class="d-flex flex-column flex-md-row gap-3 mb-3">
            <a href="{% url 'payment:login' %}" class="btn btn-outline-light btn-lg px-4">Login</a>
            <a href="{% url 'payment:signup' %}" class="btn btn-light btn-lg px-4 text-dark">Create Account</a>
        </div>

        <!-- OR -->
        <p class="text-light mb-2">Or continue with</p>

        <!-- Social Buttons -->
        <div class="d-flex flex-column flex-md-row gap-3">
            <a href="#" class="btn btn-light text-dark btn-social d-flex align-items-center justify-content-center">
                <img src="{% static 'images/google-icon.png' %}" class="google-icon me-2" alt="Google"> Google
            </a>
            <a href="#" class="btn btn-light text-dark btn-social d-flex align-items-center justify-content-center">
                <span class="phone-emoji me-2">📞</span> Phone
            </a>
        </div>

    </div>
</div>

</body>
</html>
