{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transaction Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('https://source.unsplash.com/1600x900/?finance,technology');
      background-size: cover;
      background-position: center;
    }

    select option {
      background-color: #1f2937; /* gray-800 */
      color: white;
    }

    select option:hover {
      background-image: linear-gradient(to right, rgba(34,211,238,0.7), rgba(14,165,233,0.7));
      color: #0ff;
    }

    /* Tooltip styles */
    .tooltip {
      position: relative;
      cursor: pointer;
    }

    .tooltip-text {
      visibility: hidden;
      width: 160px;
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      border-radius: 5px;
      padding: 5px;
      position: absolute;
      z-index: 1;
      bottom: 100%; /* Position above the element */
      left: 50%;
      margin-left: -80px; /* Center the tooltip */
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-900 bg-opacity-70">

  <form method="post" class="space-y-6 w-full max-w-xl p-8 bg-gray-900 bg-opacity-80 rounded-xl shadow-2xl backdrop-blur">
    {% csrf_token %}

    <h2 class="text-3xl font-extrabold text-center text-cyan-400 mb-4">Transaction Predictor</h2>

    <!-- Merchant Type -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Merchant Type
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The type of merchant or business associated with the transaction (e.g., Retail, Services, Online).</span>
        </span>
      </label>
      <select name="merchant_type" required
              class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none">
        <option value="retail">Retail</option>
        <option value="services">Services</option>
        <option value="online">Online</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- Currency List -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Currency
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">Select the currency used for this transaction (e.g., USD, EUR, GBP).</span>
        </span>
      </label>
      <select name="currency" id="currency" onchange="updateCurrencySymbol()" required
              class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none">
        <option value="USD" data-symbol="$">USD</option>
        <option value="GBP" data-symbol="£">GBP</option>
        <option value="EUR" data-symbol="€">EUR</option>
        <option value="JPY" data-symbol="¥">JPY</option>
        <option value="INR" data-symbol="₹">INR</option>
      </select>
    </div>

    <!-- Country List -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Country
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">Select the country where the transaction took place.</span>
        </span>
      </label>
      <select name="country" required
              class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none">
        <option value="US">United States</option>
        <option value="GB">United Kingdom</option>
        <option value="DE">Germany</option>
        <option value="IN">India</option>
        <option value="JP">Japan</option>
        <option value="FR">France</option>
        <!-- Add more countries as necessary -->
      </select>
    </div>

    <!-- Step (Process of Transaction) -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Step
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The step in the transaction process (e.g., stage of approval or review).</span>
        </span>
      </label>
      <input type="number" name="step" required
             class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- Transaction Amount -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Transaction Amount
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The amount of money being transferred in the transaction.</span>
        </span>
      </label>
      <div class="flex items-center space-x-2">
        <span id="currency-symbol" class="text-2xl font-semibold text-cyan-400">$</span>
        <input type="number" step="0.01" name="amount" required
               class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
      </div>
    </div>

    <!-- Old Balance (Origin) -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Old Balance (Origin)
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The original balance of the sender's account before the transaction.</span>
        </span>
      </label>
      <input type="number" step="0.01" name="oldbalanceOrg" required
             class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- New Balance (Origin) -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        New Balance (Origin)
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The balance of the sender's account after the transaction.</span>
        </span>
      </label>
      <input type="number" step="0.01" name="newbalanceOrig" required
             class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- Old Balance (Destination) -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Old Balance (Destination)
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The balance of the recipient's account before the transaction.</span>
        </span>
      </label>
      <input type="number" step="0.01" name="oldbalanceDest" required
             class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- New Balance (Destination) -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        New Balance (Destination)
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">The balance of the recipient's account after the transaction.</span>
        </span>
      </label>
      <input type="number" step="0.01" name="newbalanceDest" required
             class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-400">
    </div>

    <!-- Flagged as Fraud -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Is Flagged as Fraud
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">Indicates whether the transaction has been flagged as fraudulent.</span>
        </span>
      </label>
      <select name="isFlaggedFraud"
              class="w-full px-4 py-3 rounded-lg bg-gray-800 text-white font-semibold border-2 border-cyan-500 focus:outline-none">
        <option value="0">No</option>
        <option value="1">Yes</option>
      </select>
    </div>

    <!-- Transaction Type -->
    <div>
      <label class="block mb-2 text-base font-bold text-cyan-300">
        Transaction Type
        <span class="tooltip text-sm text-gray-500"> 
          (?) 
          <span class="tooltip-text">Select the type of transaction (e.g., Payment, Cash Out, etc.).</span>
        </span>
      </label>
      <div class="flex space-x-4">
        <label class="flex items-center">
          <input type="radio" name="transaction_type" value="CASH_OUT"> CASH_OUT
        </label>
        <label class="flex items-center">
          <input type="radio" name="transaction_type" value="DEBIT"> DEBIT
        </label>
        <label class="flex items-center">
          <input type="radio" name="transaction_type" value="PAYMENT"> PAYMENT
        </label>
        <label class="flex items-center">
          <input type="radio" name="transaction_type" value="TRANSFER"> TRANSFER
        </label>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit"
            class="w-full bg-gradient-to-r from-cyan-500 via-cyan-400 to-cyan-600 hover:from-cyan-600 hover:to-cyan-400 text-white font-extrabold py-3 px-6 rounded-xl shadow-md transition-all duration-300">
      🔍 Predict
    </button>

    <!-- Prediction Result -->
    <div id="prediction-result" class="text-center mt-6 text-white text-2xl font-extrabold hidden">
      Result: <span class="text-cyan-400">Pending...</span>
    </div>
  </form>

  <script>
    function updateCurrencySymbol() {
      const currency = document.getElementById("currency").value;
      const symbolMap = {
        USD: "$",
        GBP: "£",
        EUR: "€",
        JPY: "¥",
        INR: "₹"
      };
      const symbol = symbolMap[currency] || "$"; // Default to dollar if not found
      document.getElementById("currency-symbol").textContent = symbol;
    }
  </script>

</body>
</html>
