<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecurePay AI{% endblock %}</title>
    <!-- Include Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Styling -->
    <style>
        /* General body styling with dark cyan background */
        body {
            background-color: #006a7c; /* Dark Cyan Background */
            color: #f5f5f5; /* Light Text Color */
            font-family: 'Arial', sans-serif;
            height: 100vh;
            margin: 0;
        }

        /* Header with dark cyan background */
        header {
            background-color: #004c5c; /* Darker Cyan for header */
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #06b6d4; /* Cyan accent */
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
        }

        /* Footer styling */
        footer {
            background-color: #004c5c; /* Darker Cyan */
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        footer p {
            color: #bbb;
        }

        /* Main container styling */
        .container {
            padding: 40px 20px;
        }

        /* Card styling with subtle shadows and lighter color */
        .card {
            background-color: #1c1c1c; /* Dark background for cards */
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .card-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #06b6d4; /* Cyan color for titles */
        }

        .card-body {
            padding: 30px;
        }

        .card p {
            font-size: 1.5rem;
            color: #f5f5f5; /* Light text for content */
        }

        /* Chart section */
        .mt-5 {
            margin-top: 50px;
        }

        /* Button customization */
        .btn-custom {
            background-color: #06b6d4;
            color: white;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #04a5b6;
        }

        /* Card hover effect */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <header>
        <h1>SecurePay AI Dashboard</h1>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 SecurePay AI - All rights reserved</p>
    </footer>
</body>
</html>
